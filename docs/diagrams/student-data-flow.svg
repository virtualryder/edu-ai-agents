<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="aO" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#FF9900"/></marker>
    <marker id="aP" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8C4FFF"/></marker>
    <marker id="aT" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#01A88D"/></marker>
    <marker id="aR" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DD344C"/></marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="48" y="38" font-size="22" font-weight="bold" fill="#232F3E">EDU AI Agent Suite — Student Data Flow (FERPA · COPPA · record-level authorization)</text>

  <!-- Row A: users, edge & identity -->
  <rect x="48" y="100" width="250" height="76" rx="8" fill="#232F3E"/>
  <text x="173" y="132" font-size="13" fill="#FFFFFF" text-anchor="middle">Students · families · educators</text>
  <text x="173" y="150" font-size="13" fill="#FFFFFF" text-anchor="middle">LMS (LTI 1.3) · portal · voice</text>

  <rect x="328" y="100" width="250" height="76" rx="8" fill="#232F3E"/>
  <text x="453" y="132" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon CloudFront</text>
  <text x="453" y="150" font-size="14" fill="#FFFFFF" text-anchor="middle">+ AWS WAF + Shield</text>

  <rect x="608" y="100" width="520" height="76" rx="8" fill="#8C4FFF"/>
  <text x="868" y="126" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon Cognito — district / university IdP · MFA</text>
  <rect x="645" y="136" width="90" height="26" rx="6" fill="#FFFFFF"/>
  <text x="690" y="153" font-size="11" fill="#232F3E" text-anchor="middle">edu_role</text>
  <rect x="743" y="136" width="150" height="26" rx="6" fill="#FFFFFF"/>
  <text x="818" y="153" font-size="11" fill="#232F3E" text-anchor="middle">under_13 (COPPA)</text>
  <rect x="901" y="136" width="190" height="26" rx="6" fill="#FFFFFF"/>
  <text x="996" y="153" font-size="11" fill="#232F3E" text-anchor="middle">rights_transferred (FERPA)</text>

  <rect x="1158" y="100" width="194" height="76" rx="8" fill="#232F3E"/>
  <text x="1255" y="132" font-size="14" fill="#FFFFFF" text-anchor="middle">API Gateway</text>
  <text x="1255" y="150" font-size="14" fill="#FFFFFF" text-anchor="middle">JWT authorizer</text>

  <line x1="302" y1="138" x2="322" y2="138" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <line x1="582" y1="138" x2="602" y2="138" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <line x1="1132" y1="138" x2="1152" y2="138" stroke="#8C4FFF" stroke-width="2" marker-end="url(#aP)"/>

  <path d="M1255,176 L1255,214 L700,214 L700,244" fill="none" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>

  <!-- Row B: gateway -->
  <rect x="48" y="250" width="950" height="130" rx="8" fill="#232F3E"/>
  <text x="64" y="278" font-size="15" font-weight="bold" fill="#FFFFFF">MCP Authorization Gateway — record-level, role-scoped access</text>
  <rect x="64" y="292" width="150" height="30" rx="6" fill="#FFFFFF"/>
  <text x="139" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Deny-by-default</text>
  <rect x="222" y="292" width="280" height="30" rx="6" fill="#FFFFFF"/>
  <text x="362" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Record-level authorization (per student)</text>
  <rect x="510" y="292" width="170" height="30" rx="6" fill="#FFFFFF"/>
  <text x="595" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Scoped per-call tokens</text>
  <rect x="688" y="292" width="160" height="30" rx="6" fill="#FFFFFF"/>
  <text x="768" y="311" font-size="11" fill="#232F3E" text-anchor="middle">Append-only audit</text>
  <rect x="64" y="330" width="300" height="30" rx="6" fill="#FF9900"/>
  <text x="214" y="349" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">Student-PII masking — before model &amp; audit</text>
  <rect x="372" y="330" width="250" height="30" rx="6" fill="#FF9900"/>
  <text x="497" y="349" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">FERPA rights-transfer enforcement</text>
  <rect x="630" y="330" width="210" height="30" rx="6" fill="#FF9900"/>
  <text x="735" y="349" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">COPPA under-13 protections</text>

  <!-- Educator approval gate -->
  <rect x="1048" y="250" width="304" height="130" rx="8" fill="#01A88D"/>
  <text x="1200" y="280" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Educator approval gate</text>
  <text x="1200" y="302" font-size="13" fill="#FFFFFF" text-anchor="middle">grading &amp; feedback release is</text>
  <text x="1200" y="320" font-size="13" fill="#FFFFFF" text-anchor="middle">hard-gated — nothing reaches a</text>
  <text x="1200" y="338" font-size="13" fill="#FFFFFF" text-anchor="middle">student without educator sign-off</text>
  <line x1="998" y1="315" x2="1042" y2="315" stroke="#01A88D" stroke-width="2" marker-end="url(#aT)"/>

  <!-- Deny note -->
  <line x1="670" y1="380" x2="670" y2="402" stroke="#DD344C" stroke-width="2" marker-end="url(#aR)"/>
  <rect x="470" y="406" width="430" height="36" rx="8" fill="#FFFFFF" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="685" y="429" font-size="12" font-weight="bold" fill="#DD344C" text-anchor="middle">× No rights over the record / wrong student → DENY 403 (fail closed)</text>

  <!-- Row C: runtime + model -->
  <line x1="198" y1="380" x2="198" y2="464" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <rect x="48" y="470" width="300" height="90" rx="8" fill="#232F3E"/>
  <text x="198" y="500" font-size="14" fill="#FFFFFF" text-anchor="middle">Agent runtime — tutor,</text>
  <text x="198" y="518" font-size="14" fill="#FFFFFF" text-anchor="middle">grading &amp; concierge agents</text>
  <text x="198" y="536" font-size="14" fill="#FFFFFF" text-anchor="middle">Step Functions + Lambda</text>

  <rect x="398" y="452" width="560" height="112" rx="8" fill="none" stroke="#232F3E" stroke-width="1.5" stroke-dasharray="6,5"/>
  <text x="414" y="466" font-size="11" font-weight="bold" fill="#545B64">AWS PRIVATELINK / VPC ENDPOINT BOUNDARY</text>
  <rect x="418" y="478" width="380" height="76" rx="8" fill="#232F3E"/>
  <text x="608" y="498" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon Bedrock (Claude)</text>
  <text x="608" y="516" font-size="14" fill="#FFFFFF" text-anchor="middle">+ Guardrails — age-appropriate</text>
  <text x="608" y="534" font-size="14" fill="#FFFFFF" text-anchor="middle">filters · Knowledge Bases</text>
  <line x1="348" y1="516" x2="412" y2="516" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>

  <text x="398" y="588" font-size="12.5" font-style="italic" fill="#545B64">Regional AWS service reached over private networking —</text>
  <text x="398" y="606" font-size="12.5" font-style="italic" fill="#545B64">no egress to external AI APIs.</text>

  <!-- Row D: evidence -->
  <line x1="198" y1="560" x2="198" y2="654" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <text x="208" y="615" font-size="11" fill="#545B64">masked audit events</text>

  <rect x="48" y="660" width="340" height="80" rx="8" fill="#232F3E"/>
  <text x="218" y="694" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon DynamoDB</text>
  <text x="218" y="712" font-size="14" fill="#FFFFFF" text-anchor="middle">append-only audit (masked)</text>

  <rect x="428" y="660" width="340" height="80" rx="8" fill="#232F3E"/>
  <text x="598" y="694" font-size="14" fill="#FFFFFF" text-anchor="middle">Amazon S3 Object Lock</text>
  <text x="598" y="712" font-size="14" fill="#FFFFFF" text-anchor="middle">WORM evidence</text>

  <rect x="808" y="660" width="380" height="80" rx="8" fill="#232F3E"/>
  <text x="998" y="694" font-size="14" fill="#FFFFFF" text-anchor="middle">AWS KMS — customer-managed CMK</text>
  <text x="998" y="712" font-size="14" fill="#FFFFFF" text-anchor="middle">EDU / student data class</text>

  <text x="48" y="790" font-size="13" fill="#545B64">Cross-cutting: AWS CloudTrail · CloudWatch alarms · fairness screens · WCAG 2.1 AA output checks · FERPA §99.31 role mapping</text>

  <!-- Legend -->
  <rect x="48" y="840" width="26" height="16" rx="3" fill="#232F3E"/>
  <text x="82" y="853" font-size="12" fill="#232F3E">AWS / platform component</text>
  <rect x="290" y="840" width="26" height="16" rx="3" fill="#8C4FFF"/>
  <text x="324" y="853" font-size="12" fill="#232F3E">Identity</text>
  <rect x="420" y="840" width="26" height="16" rx="3" fill="#01A88D"/>
  <text x="454" y="853" font-size="12" fill="#232F3E">Human gate</text>
  <line x1="580" y1="848" x2="628" y2="848" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <text x="638" y="853" font-size="12" fill="#232F3E">Governed flow</text>
  <rect x="790" y="840" width="26" height="16" rx="3" fill="none" stroke="#232F3E" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="824" y="853" font-size="12" fill="#232F3E">PrivateLink boundary</text>
  <line x1="1010" y1="848" x2="1058" y2="848" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <text x="1068" y="853" font-size="12" fill="#232F3E">Deny (fail closed)</text>
</svg>
