name: ci

on:
  push:
    branches: [main, master]
  pull_request:

# Demo mode: deterministic, no API key, fixtures. No secrets required.
env:
  EXTRACT_MODE: demo
  CONNECTOR_MODE: fixture
  PYTHONPATH: platform_core:.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e platform_core
          pip install pytest "langgraph>=0.2" "langchain-core>=0.3"

      - name: Platform + governance tests
        run: pytest platform_core/tests governance/tests -q

      - name: Agent tests (each in its own process — duplicate package names)
        run: |
          set -e
          for d in [0-9][0-9]-*; do
            echo "== $d =="
            pytest "$d/tests" -q -p no:cacheprovider
          done

      - name: Canvas LTI role-mapping tests
        run: pytest aws-native-reference/_shared/canvas_lti/test_lti_roles.py -q

      - name: Prompt manifest drift check (model change-control)
        run: python -m governance.prompt_registry

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Byte-compile all Python (catch syntax errors)
        run: python -m compileall -q platform_core governance [0-9][0-9]-* aws-native-reference

  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Lint CloudFormation templates
        run: |
          pip install cfn-lint
          # BLOCKING: lint failures fail the build. A small, documented allow-list
          # of pre-existing/intentional findings lives in .cfnlintrc (which also
          # sets the template glob). Any NEW finding fails CI.
          cfn-lint
