AWSTemplateFormatVersion: "2010-09-09"
Description: >
  EDU AI Agent Suite - Security stack (Layer 3 identity + Layer 5 safety).
  REFERENCE / ACCELERATOR TEMPLATE. The customer must tune the Guardrail for
  their student population (including minors / COPPA under-13), wire their own
  IdP, and validate the IAM least-privilege boundary before production use.
  Provisions: a per-environment KMS customer-managed key; a Bedrock Guardrail
  (PII denial, age-appropriate content for minors, prohibited-behavior topic
  filters); a Cognito user pool + identity pool federating the institution's
  IdP via SAML/OIDC with a custom:edu_role attribute; and the least-privilege
  agent IAM execution role.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, test, stage, prod]

  IdpMetadataUrl:
    Type: String
    Default: ""
    Description: >
      SAML metadata document URL for the institution's IdP (Okta / Entra /
      Google Workspace / AD FS). Leave blank to provision the user pool without
      a federated provider (e.g., for an early demo); the customer wires this
      during IdP integration.

  IdpProviderType:
    Type: String
    Default: SAML
    AllowedValues: [SAML, OIDC]
    Description: Federation protocol for the institution IdP.

  AuditTableArn:
    Type: String
    Default: ""
    Description: >
      ARN of the append-only audit DynamoDB table (from the data stack). Used
      to scope the agent role's write-only append permission. Optional at
      create time; the master template wires it.

  BedrockModelArns:
    Type: CommaDelimitedList
    # SECURITY: scopes bedrock:InvokeModel* to specific foundation-model /
    # inference-profile ARNs instead of "*". The default covers the Claude
    # Sonnet + Haiku families for THIS region using the standard
    # arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/... pattern
    # plus the cross-region inference-profile ARNs. Customers MUST pin the EXACT
    # model and inference-profile ARNs they are approved to use (do not leave the
    # wildcard suffix broader than required); add/remove entries per their model
    # allow-list and region. Inference-profile invocation also requires invoke
    # permission on the underlying foundation model in each member region.
    Default: "arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-sonnet-*,arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-5-haiku-*,arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-7-sonnet-*,arn:aws:bedrock:us-east-1:*:inference-profile/us.anthropic.claude-3-5-sonnet-*,arn:aws:bedrock:us-east-1:*:inference-profile/us.anthropic.claude-3-5-haiku-*,arn:aws:bedrock:us-east-1:*:inference-profile/us.anthropic.claude-3-7-sonnet-*"
    Description: >
      Comma-delimited list of Bedrock foundation-model and inference-profile ARNs
      the agent role may invoke. Replaces a Resource "*" grant. Customers MUST
      pin the exact model / inference-profile ARNs (and region) they are approved
      to use.

  CognitoMfaConfiguration:
    Type: String
    Default: OPTIONAL
    AllowedValues: [OPTIONAL, ON]
    Description: >
      Cognito user-pool MFA mode. PRODUCTION MUST set this to ON, and MFA must
      also be enforced at the authoritative IdP for privileged roles (educator /
      counselor / administrator) - Cognito MFA here is defense-in-depth, not the
      sole control. Default OPTIONAL is for demo only.

  AppCallbackUrls:
    Type: CommaDelimitedList
    # PRODUCTION: set to the institution's real HTTPS redirect URI(s). The
    # localhost default below is for local demo ONLY and MUST be replaced before
    # any non-demo deployment. Do not ship localhost callback URLs to production.
    Default: "https://localhost/callback"
    Description: >
      OAuth callback (redirect) URLs for the user-pool app client. Replace the
      demo localhost value with the institution's production HTTPS redirect URIs.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasIdp: !Not [!Equals [!Ref IdpMetadataUrl, ""]]
  IsSaml: !Equals [!Ref IdpProviderType, SAML]
  HasAuditTable: !Not [!Equals [!Ref AuditTableArn, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- KMS customer-managed key: one key per environment ---------------------
  # Encrypts audit table, HITL table, WORM bucket, Secrets Manager secrets.
  # NOTE: losing this CMK loses the data it protects - see runbooks/DR-RUNBOOK.md.
  EnvKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub "EDU AI Agent Suite CMK - ${Environment}"
      EnableKeyRotation: true
      MultiRegion: false
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          # AWS-recommended pattern: grant the account root kms:* so that IAM
          # policies on principals (not the key policy) govern key usage. The
          # agent's access is granted least-privilege by AgentExecutionRole's
          # own ScopedSecretsAndKms / UseEnvCmk statement (kms:Decrypt +
          # kms:GenerateDataKey on this key ARN). Naming the role ARN as a
          # principal here created a KMS-key <-> role circular dependency
          # (E3004) with no security benefit, since account-root delegation +
          # the role's IAM policy already authorize exactly that access.
          - Sid: AccountRoot
            Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  EnvKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/edu-agents-${Environment}"
      TargetKeyId: !Ref EnvKmsKey

  # --- Bedrock Guardrail: runs on every LLM call (Layer 5) -------------------
  # Reference configuration. The customer MUST tune sensitivity, denied topics,
  # and the minors / COPPA under-13 posture for their population.
  AgentGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub "edu-agents-${Environment}-guardrail"
      Description: >
        EDU compliance Guardrail - PII denial, age-appropriate content for
        minors, prohibited-behavior topic filters. Supplements (never replaces)
        Layer 3 gateway authorization.
      BlockedInputMessaging: >
        This request cannot be processed. If you need help, please contact your
        school's support team.
      BlockedOutputsMessaging: >
        This response was withheld by the institution's content safeguards.
      KmsKeyArn: !GetAtt EnvKmsKey.Arn
      # PII denial - anonymize/deny FERPA-protected and COPPA identifiers.
      SensitiveInformationPolicyConfig:
        PiiEntitiesConfig:
          - Type: NAME
            Action: ANONYMIZE
          - Type: EMAIL
            Action: ANONYMIZE
          - Type: PHONE
            Action: ANONYMIZE
          - Type: US_SOCIAL_SECURITY_NUMBER
            Action: BLOCK
          - Type: AGE
            Action: ANONYMIZE
          - Type: ADDRESS
            Action: ANONYMIZE
      # Prohibited-behavior topic filters (reference examples).
      TopicPolicyConfig:
        TopicsConfig:
          - Name: ProhibitedAssessmentCompletion
            Definition: >
              Requests for the agent to directly complete a graded assessment,
              exam, or assignment on a student's behalf in violation of
              academic-integrity policy.
            Examples:
              - "Write my entire graded essay and submit it as mine."
              - "Give me the exam answer key."
            Type: DENY
          - Name: SelfHarmOrCrisis
            Definition: >
              Content indicating a student is in crisis or at risk of self-harm,
              which must route to human crisis resources, not an autonomous reply.
            Type: DENY
      # Age-appropriate content filters - heightened for student-facing surfaces.
      ContentPolicyConfig:
        FiltersConfig:
          - Type: SEXUAL
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: VIOLENCE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: HATE
            InputStrength: HIGH
            OutputStrength: HIGH
          - Type: INSULTS
            InputStrength: MEDIUM
            OutputStrength: MEDIUM
          - Type: PROMPT_ATTACK
            InputStrength: HIGH
            OutputStrength: NONE

  AgentGuardrailVersion:
    Type: AWS::Bedrock::GuardrailVersion
    Properties:
      GuardrailIdentifier: !GetAtt AgentGuardrail.GuardrailId
      Description: !Sub "Initial published version - ${Environment}"

  # --- Cognito user pool: federates the institution IdP ----------------------
  # Identity provider for the suite. Roles ride in the custom:edu_role claim.
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "edu-agents-${Environment}"
      # SECURITY: MFA mode is parameterized (CognitoMfaConfiguration). Production
      # MUST deploy with ON and additionally enforce MFA at the authoritative IdP
      # for privileged roles. Default OPTIONAL is for demo only.
      MfaConfiguration: !Ref CognitoMfaConfiguration
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 14
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        # ===================================================================
        # SECURITY - NON-SELF-ASSERTED IDENTITY CLAIMS (REQUIRED IN PRODUCTION)
        # The custom attributes below (edu_role, under_13, rights_transferred,
        # and any age signal) drive authorization and COPPA/FERPA data handling.
        # In production they MUST be sourced from the authoritative IdP / SIS and
        # mapped from verified IdP assertions ONLY (see AttributeMapping below).
        # They MUST be treated as non-self-asserted: the app and the Layer 3
        # gateway must NEVER trust a client-set or user-mutable value for these.
        # Mutable: true here is so the IdP/SIS sync can update them - it is NOT a
        # license for end users to set their own role, under-13 status, or
        # rights-transfer state. Lock down write access accordingly.
        # ===================================================================
        # custom:edu_role carries student | guardian | educator | counselor | administrator
        - Name: edu_role
          AttributeDataType: String
          Mutable: true
          StringAttributeConstraints:
            MinLength: "1"
            MaxLength: "32"
        # under_13 flag drives heightened Guardrails / COPPA data minimization
        - Name: under_13
          AttributeDataType: String
          Mutable: true
        # age_of_majority flag carries FERPA rights-transfer state
        - Name: rights_transferred
          AttributeDataType: String
          Mutable: true
      UserPoolTags:
        edu:environment: !Ref Environment

  # SAML/OIDC federated identity provider (the institution's own IdP).
  UserPoolIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasIdp
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: InstitutionIdP
      ProviderType: !If [IsSaml, SAML, OIDC]
      ProviderDetails:
        !If
          - IsSaml
          - MetadataURL: !Ref IdpMetadataUrl
          - oidc_issuer: !Ref IdpMetadataUrl
            authorize_scopes: "openid email profile"
      # Map IdP assertions to the role + COPPA claims. The customer owns the
      # exact IdP group -> edu_role mapping and the age-of-majority logic.
      AttributeMapping:
        email: email
        "custom:edu_role": "edu_role"
        "custom:under_13": "under_13"
        "custom:rights_transferred": "rights_transferred"

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "edu-agents-${Environment}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      SupportedIdentityProviders:
        !If
          - HasIdp
          - [InstitutionIdP]
          - [COGNITO]
      # SECURITY: redirect URIs come from the AppCallbackUrls parameter. The
      # default is localhost for local demo ONLY and MUST be replaced with the
      # institution's production HTTPS redirect URIs before any prod deployment.
      CallbackURLs: !Ref AppCallbackUrls
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "edu_agents_${Environment}"
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref UserPoolClient
          ProviderName: !GetAtt UserPool.ProviderName

  # --- Agent execution IAM role: least privilege -----------------------------
  # The agent runtime assumes this role. It can invoke Bedrock (with Guardrail),
  # append to the audit table, read its scoped secrets, and use the env CMK.
  # It holds NO direct system-of-record credentials - all SoR access is brokered
  # by the Layer 3 gateway with short-lived scoped tokens.
  AgentExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "edu-agents-${Environment}-agent-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - states.amazonaws.com
                - bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole"
      Policies:
        - PolicyName: BedrockInvokeWithGuardrail
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: InvokeClaudeInAccount
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                # SECURITY: scoped to the BedrockModelArns parameter instead of
                # "*". Customers should pin the EXACT foundation-model and
                # inference-profile ARNs they are approved to use (see the
                # BedrockModelArns parameter). Note: invoking a cross-region
                # inference profile also requires invoke permission on the
                # underlying foundation-model ARN in each member region.
                Resource: !Ref BedrockModelArns
        - PolicyName: AppendOnlyAudit
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Append-only: PutItem allowed, Update/Delete intentionally absent.
              - !If
                  - HasAuditTable
                  - Sid: AppendAuditOnly
                    Effect: Allow
                    Action: dynamodb:PutItem
                    Resource: !Ref AuditTableArn
                  - !Ref AWS::NoValue
        - PolicyName: ScopedSecretsAndKms
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadConnectorSecrets
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:edu-agents/${Environment}/*"
              - Sid: UseEnvCmk
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt EnvKmsKey.Arn

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  KmsKeyArn:
    Description: Per-environment customer-managed KMS key ARN.
    Value: !GetAtt EnvKmsKey.Arn

  KmsKeyId:
    Description: Per-environment CMK ID.
    Value: !Ref EnvKmsKey

  GuardrailId:
    Description: Bedrock Guardrail ID applied on every LLM call.
    Value: !GetAtt AgentGuardrail.GuardrailId

  GuardrailVersion:
    Description: Published Guardrail version.
    Value: !GetAtt AgentGuardrailVersion.Version

  UserPoolId:
    Description: Cognito user pool federating the institution IdP.
    Value: !Ref UserPool

  IdentityPoolId:
    Description: Cognito identity pool ID.
    Value: !Ref IdentityPool

  AgentExecutionRoleArn:
    Description: Least-privilege agent execution role ARN.
    Value: !GetAtt AgentExecutionRole.Arn
